<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Wandering Photographer</title>
  <link rel="stylesheet" href="styles4.css" />
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>


<header class="site-header">

  <img src="TheDivider.png" alt="" class="top-divider">

  <div class="header-bar">
    <a href="checkout.html" class="cart-link" aria-label="Go to checkout">
      <img src="shopping.svg" alt="Shopping cart" class="cart-icon">
    </a>
  </div>

</header>
 





  <main id="main-content" class="page-content">
    <section aria-label="Travel photography posts">
      <article class="photo-card">
        <figure>
          <img src="OceanPhoto.jpg" alt="Calm blue sea beside a pale rocky coastline in Greenland at sunset" />
          <figcaption>
            This was from a fabulous trip to the coast of Greenland with my family.
            The water was lovely - but very cold!
          </figcaption>
        </figure>
        <button type="button" class="basket-button" aria-label="Add Greenland coast photo print to basket">
          Add to basket
        </button>
      </article>

      <article class="photo-card">
        <figure>
          <img src="BridgePhoto.jpg" alt="Low angle view looking up at the red Golden Gate Bridge against a blue sky" />
          <figcaption>
            A picture of the Golden Gate Bridge. New York! New York!
          </figcaption>
        </figure>
        <button type="button" class="basket-button" aria-label="Add Golden Gate Bridge photo print to basket">
          Add to basket
        </button>
      </article>

      <article class="photo-card">
        <figure>
          <img src="ValleyPhoto.jpg" alt="Wide river valley between mountains with a glacier-shaped landscape in Greenland" />
          <figcaption>
            Another great photo from Greenland. It's a river valley where a glacier used to be.
          </figcaption>
        </figure>
        <button type="button" class="basket-button" aria-label="Add Greenland valley photo print to basket">
          Add to basket
        </button>
      </article>

      <article class="photo-card">
        <figure>
          <img src="WaterfallPhoto.jpg" alt="Large waterfall dropping into a pool surrounded by green mossy rocks" />
          <figcaption>
            The waterfall made such a lovely sound. I could have fallen asleep!
          </figcaption>
        </figure>
        <button type="button" class="basket-button" aria-label="Add waterfall photo print to basket">
          Add to basket
        </button>
      </article>
    </section>
  </main>

  </footer>
</body>
</html>
